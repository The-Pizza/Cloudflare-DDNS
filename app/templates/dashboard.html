<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Cloudflare DDNS</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-zinc-950 text-zinc-200">
<div class="max-w-6xl mx-auto p-8">
    <h1 class="text-3xl font-semibold mb-8">Cloudflare DDNS v0.3</h1>
    
    <div class="bg-zinc-900 rounded-2xl p-6 border border-zinc-800">
        <h2 class="text-lg mb-4">Zones</h2>
        <div id="zones" class="space-y-2"></div>
    </div>
</div>

<script>
async function loadZones() {
    const res = await fetch('/api/zones');
    const zones = await res.json();
    const container = document.getElementById('zones');
    container.innerHTML = '';
    zones.forEach(z => {
        const div = document.createElement('div');
        div.className = 'flex justify-between p-3 bg-zinc-950 rounded-xl border border-zinc-800';
        div.innerHTML = `
            <div>${z.name}</div>
            <a href="/zones/${z.id}?name=${z.name}" class="text-sm px-3 py-1 bg-zinc-800 rounded">Manage</a>
        `;
        container.appendChild(div);
    });
}
loadZones();
</script>
</body>
</html>
