{% extends "base.html" %}
{% block title %}Settings – Cloudflare DDNS{% endblock %}
{% block content %}
<div class="mb-6 flex items-center justify-between">
  <div>
    <h1 class="text-2xl font-semibold">Settings</h1>
    <p class="text-zinc-400 text-sm mt-1">
      Edit runtime configuration. Fields shown with a
      <span class="px-1.5 py-0.5 rounded bg-amber-500/20 text-amber-300 text-xs">env-locked</span>
      badge are pinned by environment / ConfigMap and cannot be changed here.
    </p>
    <p id="whoami" class="text-xs text-zinc-400 mt-2"></p>
  </div>
  <button onclick="checkNow()" id="check-btn"
          class="text-sm px-3 py-1.5 rounded-lg bg-emerald-600/80 hover:bg-emerald-500">✓ Check all records now</button>
</div>

<section class="bg-zinc-900 border border-zinc-800 rounded-2xl divide-y divide-zinc-800" id="settings-container">
  <div class="p-6 text-zinc-500 text-sm">Loading…</div>
</section>

<div id="toast" class="fixed bottom-6 right-6 hidden bg-zinc-800 border border-zinc-700 rounded-xl px-4 py-3 shadow-xl text-sm"></div>

<script>
function showToast(msg, color="emerald") {
  const t = document.getElementById('toast');
  t.className = `fixed bottom-6 right-6 bg-zinc-800 border border-${color}-500/40 rounded-xl px-4 py-3 shadow-xl text-sm`;
  t.textContent = msg;
  t.classList.remove('hidden');
  setTimeout(() => t.classList.add('hidden'), 5000);
}

const FIELD_META = {
  cf_api_token:           {label: 'Cloudflare API Token',   type: 'password', help: 'Scoped to zones you want to manage. Shown masked.', group: 'Cloudflare'},
  ipv4_endpoint:          {label: 'IPv4 detect endpoint',   type: 'text',     help: 'Returns plain text IP. Default: https://ipinfo.io/ip', group: 'DDNS engine'},
  ipv6_endpoint:          {label: 'IPv6 detect endpoint',   type: 'text',     help: 'Leave blank to disable AAAA management.', group: 'DDNS engine'},
  poll_interval_seconds:  {label: 'Poll interval (s)',      type: 'number',   help: 'How often the engine checks for IP changes.', group: 'DDNS engine'},
  default_proxied:        {label: 'Default proxied',        type: 'bool',     help: 'New records added via UI default to this proxied state.', group: 'DDNS engine'},
  default_ttl:            {label: 'Default TTL',            type: 'number',   help: '1 = automatic (Cloudflare-managed).', group: 'DDNS engine'},
  annotation_key:         {label: 'K8s annotation key',     type: 'text',     help: 'Workloads with this annotation get auto-discovered. Comma-separate multiple keys to match any of them (useful when migrating keys).', group: 'Discovery'},

  auth_mode:              {label: 'Auth mode',              type: 'select',   options: ['none', 'oidc', 'forward-auth'],
                           help: 'none = open. oidc = built-in OpenID Connect login. forward-auth = trust reverse-proxy identity headers.',
                           group: 'Authentication'},
  session_cookie_secure:  {label: 'Secure session cookie',  type: 'bool',     help: 'Send the session cookie only over HTTPS. Keep ON in production; turn OFF only for local HTTP development.', group: 'Authentication'},

  oidc_issuer:            {label: 'OIDC Issuer URL',        type: 'text',     help: 'e.g. https://auth.example.com/application/o/cloudflare-ddns/ — must serve /.well-known/openid-configuration', group: 'OIDC client'},
  oidc_client_id:         {label: 'OIDC Client ID',         type: 'text',     help: 'Public client identifier from your IdP.', group: 'OIDC client'},
  oidc_client_secret:     {label: 'OIDC Client Secret',     type: 'password', help: 'Optional for public clients (PKCE-only); required by most confidential clients.', group: 'OIDC client'},
  oidc_scopes:            {label: 'OIDC Scopes',            type: 'text',     help: 'Space-separated. Default: openid profile email groups', group: 'OIDC client'},
  oidc_redirect_url:      {label: 'OIDC Redirect URL',      type: 'text',     help: 'Override the auto-detected callback URL. Must match what you registered with the IdP.', group: 'OIDC client'},
  oidc_username_claim:    {label: 'Username claim',         type: 'text',     help: 'Default: preferred_username', group: 'OIDC client'},
  oidc_email_claim:       {label: 'Email claim',            type: 'text',     help: 'Default: email', group: 'OIDC client'},
  oidc_groups_claim:      {label: 'Groups claim',           type: 'text',     help: 'Default: groups', group: 'OIDC client'},
  oidc_allowed_groups:    {label: 'Allowed groups',         type: 'text',     help: 'Comma-separated. Empty = any authenticated user. e.g. domain admins,ddns operators', group: 'OIDC client'},
  oidc_allowed_emails:    {label: 'Allowed emails',         type: 'text',     help: 'Optional comma-separated allow-list of full email addresses.', group: 'OIDC client'},

  forward_auth_user_header:   {label: 'Username header',    type: 'text',     help: 'Default: X-authentik-username (oauth2-proxy: X-Forwarded-User)', group: 'Forward-auth headers'},
  forward_auth_email_header:  {label: 'Email header',       type: 'text',     help: 'Default: X-authentik-email', group: 'Forward-auth headers'},
  forward_auth_groups_header: {label: 'Groups header',      type: 'text',     help: 'Default: X-authentik-groups', group: 'Forward-auth headers'},
  forward_auth_groups_separator: {label: 'Groups separator', type: 'text',    help: 'Character delimiting groups in the header. Default: |', group: 'Forward-auth headers'},
};

async function loadSettings() {
  const container = document.getElementById('settings-container');
  // whoami banner
  try {
    const wr = await fetch('/auth/whoami');
    if (wr.ok) {
      const w = await wr.json();
      const wb = document.getElementById('whoami');
      if (wb) {
        if (w.user) {
          wb.innerHTML = `Signed in as <span class="font-mono">${w.user.username}</span>${w.user.email ? ' &lt;'+w.user.email+'&gt;' : ''} via <span class="px-1.5 py-0.5 bg-zinc-800 rounded text-xs">${w.auth_mode}</span> · <a href="/auth/logout" class="underline hover:text-white">Sign out</a>`;
        } else {
          wb.innerHTML = `Auth mode: <span class="px-1.5 py-0.5 bg-zinc-800 rounded text-xs">${w.auth_mode}</span>${w.auth_mode === 'oidc' ? ' · <a href="/auth/login" class="underline hover:text-white">Sign in</a>' : ''}`;
        }
      }
    }
  } catch (e) { /* ignore */ }

  try {
    const r = await fetch('/api/settings');
    if (!r.ok) throw new Error(await r.text());
    const data = await r.json();
    // Determine current auth_mode for conditional sections
    const currentMode = String(data.auth_mode ? data.auth_mode.value : 'none').toLowerCase();
    container.innerHTML = '';
    // Group rows by FIELD_META.group
    const byGroup = {};
    for (const [key, info] of Object.entries(data)) {
      const meta = FIELD_META[key] || {label: key, type: 'text', help: '', group: 'Other'};
      (byGroup[meta.group || 'Other'] = byGroup[meta.group || 'Other'] || []).push([key, info, meta]);
    }
    const groupOrder = ['Cloudflare', 'DDNS engine', 'Discovery', 'Authentication', 'OIDC client', 'Forward-auth headers', 'Other'];
    for (const group of groupOrder) {
      if (!byGroup[group]) continue;
      const header = document.createElement('div');
      header.setAttribute('data-group', group);
      header.className = 'px-6 py-3 bg-zinc-950/50 border-b border-zinc-800 text-xs uppercase tracking-wider text-zinc-400 font-semibold';
      header.textContent = group;
      container.appendChild(header);
      for (const [key, info, meta] of byGroup[group]) {
        const locked = info.env_locked;
        const row = document.createElement('div');
        row.setAttribute('data-group', group);
        row.className = 'px-6 py-4 grid md:grid-cols-3 gap-4 items-center';
        let input;
        if (meta.type === 'bool') {
          input = `<input type="checkbox" id="f-${key}" ${(info.value === true || info.value === 'True' || info.value === 'true') ? 'checked' : ''} ${locked ? 'disabled' : ''} class="accent-emerald-500 h-5 w-5"/>`;
        } else if (meta.type === 'select') {
          input = `<select id="f-${key}" ${locked ? 'disabled' : ''} ${key === 'auth_mode' ? 'onchange="onAuthModeChange(this)"' : ''} class="bg-zinc-950 border border-zinc-800 rounded px-2 py-1.5 text-sm w-full ${locked ? 'opacity-50' : ''}">
            ${meta.options.map(o => `<option ${String(info.value) === o ? 'selected' : ''}>${o}</option>`).join('')}
          </select>`;
        } else {
          input = `<input id="f-${key}" type="${meta.type}" value="${info.value === null ? '' : String(info.value).replace(/"/g,'&quot;')}" ${locked ? 'disabled' : ''} class="bg-zinc-950 border border-zinc-800 rounded px-2 py-1.5 text-sm w-full font-mono ${locked ? 'opacity-50' : ''}"/>`;
        }
        row.innerHTML = `
          <div>
            <div class="font-medium flex items-center gap-2">
              ${meta.label}
              ${locked ? '<span class="px-1.5 py-0.5 rounded bg-amber-500/20 text-amber-300 text-xs">env-locked</span>' : ''}
            </div>
            <div class="text-xs text-zinc-500 mt-0.5">${meta.help}</div>
            <div class="text-xs text-zinc-600 mt-0.5 font-mono">${key}</div>
          </div>
          <div class="md:col-span-2 flex gap-2 items-center">
            ${input}
            <button onclick="saveSetting('${key}', '${meta.type}')" ${locked ? 'disabled' : ''}
              class="px-3 py-1.5 rounded bg-emerald-600 hover:bg-emerald-500 text-sm ${locked ? 'opacity-30 cursor-not-allowed' : ''}">Save</button>
          </div>`;
        container.appendChild(row);
      }
    }
    // Initial visibility based on the persisted auth_mode
    renderForMode(currentMode);
  } catch (e) {
    container.innerHTML = `<div class="p-6 text-red-400 text-sm">Failed: ${e.message}</div>`;
  }
}

// Dropdown change → re-render sections only. Nothing is saved until the user
// hits Save (which is exactly how every other field works). Avoids the trap
// where flipping to a broken mode immediately locks you out.
function onAuthModeChange(sel) {
  renderForMode(sel.value);
}

function renderForMode(mode) {
  const m = String(mode || 'none').toLowerCase();
  // Toggle group visibility based on the chosen mode
  document.querySelectorAll('[data-group]').forEach(el => {
    const g = el.getAttribute('data-group');
    let show = true;
    if (g === 'OIDC client') show = (m === 'oidc');
    else if (g === 'Forward-auth headers') show = (m === 'forward-auth');
    el.style.display = show ? '' : 'none';
  });
}

async function saveSetting(key, type) {
  const el = document.getElementById(`f-${key}`);
  let value;
  if (type === 'bool') value = el.checked ? 'true' : 'false';
  else value = el.value;
  try {
    const r = await fetch('/api/settings', {
      method: 'POST', headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({key, value}),
    });
    if (!r.ok) throw new Error(await r.text());
    showToast(`Saved ${key}`);
  } catch (e) {
    showToast('Save failed: ' + e.message, 'red');
  }
}

async function checkNow() {
  const btn = document.getElementById('check-btn');
  btn.disabled = true; btn.textContent = '⏳ Checking…';
  try {
    const r = await fetch('/api/verify', {method: 'POST'});
    if (!r.ok) throw new Error(await r.text());
    const s = await r.json();
    showToast(`${s.checked} checked · ${s.in_sync} in sync · ${s.updated} updated · ${s.errors} errors`, s.errors ? 'red' : 'emerald');
  } catch (e) {
    showToast('Check failed: ' + e.message, 'red');
  } finally {
    btn.disabled = false; btn.textContent = '✓ Check all records now';
  }
}

loadSettings();
</script>
{% endblock %}
