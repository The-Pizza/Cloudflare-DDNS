# Example: Annotation-driven discovery
#
# Adding the `cloudflare-ddns.io/dns-name` annotation
# to ANY Service, Deployment, or Ingress causes that hostname to
# appear in the "Discovered" tab of the Cloudflare DDNS UI.
#
# This example annotates an nginx Deployment.

apiVersion: apps/v1
kind: Deployment
metadata:
  name: example-app
  namespace: default
  annotations:
    cloudflare-ddns.io/dns-name: "example.example.com"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: example-app
  template:
    metadata:
      labels:
        app: example-app
    spec:
      containers:
        - name: app
          image: nginx:alpine
          ports:
            - containerPort: 80
